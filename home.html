<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faster - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        /* App-like behavior for WebView */
        html, body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overscroll-behavior-y: none; /* Prevents pull-to-refresh */
            -webkit-tap-highlight-color: transparent; 
            user-select: none; /* Prevents text selection like a real app */
        }
        
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
        .sidebar.active { transform: translateX(0); }
        
        /* 3D Brand Logo */
        .brand-logo-gol { 
            object-fit: cover; 
            border-radius: 9999px; 
            border: 2px solid #f97316;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.2);
        }

        .notif-badge { 
            position: absolute; top: -2px; right: -2px; 
            background: #ef4444; border: 2px solid white; 
            width: 12px; height: 12px; border-radius: 50%; 
            display: none; animation: pulse 1.5s infinite; z-index: 10;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        
        .action-card { transition: all 0.2s ease; }
        .action-card:active { transform: scale(0.95); }

        /* Offline Banner Animation */
        #offlineBanner { transition: top 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="offlineBanner" class="fixed top-[-50px] left-0 w-full bg-red-500 text-white text-center text-[10px] uppercase tracking-widest py-2 z-[60] font-black shadow-md">
        <i class="fas fa-wifi-slash mr-2"></i> No Internet Connection
    </div>

    <audio id="notifSound" src="https://hfaghazbwdbjurachzzq.supabase.co/storage/v1/object/public/order-files/rigtone.mp3" preload="auto"></audio>

    <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-[80%] max-w-[300px] bg-white z-50 shadow-2xl p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <img id="sideLogo" src="" class="w-10 h-10 brand-logo-gol hidden">
                <h2 class="text-xl font-black text-gray-800 tracking-tighter">FASTER <span class="text-orange-500 italic">APP</span></h2>
            </div>
            <i class="fas fa-times text-xl text-gray-400 cursor-pointer" onclick="toggleMenu()"></i>
        </div>

        <nav class="space-y-3 flex-1">
            <div onclick="location.href='wallet.html'" class="p-4 bg-orange-50 rounded-2xl cursor-pointer border border-orange-100 flex justify-between items-center group active:bg-orange-100 transition-all">
                <div class="flex items-center gap-3">
                    <i class="fas fa-wallet text-orange-500"></i>
                    <span class="font-bold text-gray-700">My Wallet</span>
                </div>
                <i class="fas fa-chevron-right text-[10px] text-orange-300"></i>
            </div>

            <a href="csr-chat.html" class="flex items-center gap-4 p-4 hover:bg-gray-50 rounded-2xl transition font-bold text-gray-600">
                <i class="fab fa-whatsapp text-green-500 text-xl"></i>
                <span>CSR Help</span>
            </a>
        </nav>

        <button onclick="logout()" class="w-full bg-red-50 text-red-600 font-black py-4 rounded-2xl flex items-center justify-center gap-2 mt-auto uppercase tracking-widest text-xs active:bg-red-100 transition">
            <i class="fas fa-power-off"></i> Logout Account
        </button>
    </div>

    <header class="p-5 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-gray-100">
        <div class="flex items-center gap-5">
            <i class="fas fa-bars-staggered text-2xl text-gray-700 cursor-pointer active:scale-90 transition" onclick="toggleMenu()"></i>
            <div class="relative cursor-pointer active:scale-90 transition" onclick="location.href='notifications.html'">
                <i id="notifBell" class="fas fa-bell text-2xl text-gray-400"></i>
                <div id="notifBadge" class="notif-badge"></div>
            </div>
        </div>
        <div class="w-11 h-11">
            <img id="appLogo" src="" alt="Logo" class="w-full h-full brand-logo-gol hidden">
            <div id="logoFallback" class="w-11 h-11 bg-orange-500 rounded-full flex items-center justify-center shadow-md">
                <i class="fas fa-rocket text-white text-sm animate-pulse"></i>
            </div>
        </div>
    </header>

    <main class="p-6">
        <div class="mb-8 flex justify-between items-start">
            <div>
                <h2 id="greeting" class="text-sm font-bold text-gray-400 uppercase tracking-widest">Loading...</h2>
                <div class="flex items-center gap-2">
                    <p id="userName" class="text-3xl font-black text-gray-800 tracking-tighter">Customer</p>
                </div>
                
                <div id="walletMiniDisplay" class="mt-2 flex items-center gap-2 h-6">
                    <span id="walletLoading" class="text-[10px] text-gray-400 font-bold uppercase hidden"><i class="fas fa-sync-alt animate-spin mr-1"></i> Syncing Wallet...</span>
                    
                    <p id="homePendBox" class="hidden text-[10px] font-black text-red-600 bg-red-100 px-3 py-1 rounded-full uppercase border border-red-200 shadow-sm">
                        <i class="fas fa-exclamation-circle mr-1"></i> Pending: <span id="homePend">0</span>
                    </p>
                    <p id="homeRemBox" class="hidden text-[10px] font-black text-emerald-700 bg-emerald-100 px-3 py-1 rounded-full uppercase border border-emerald-200 shadow-sm">
                        <i class="fas fa-check-circle mr-1"></i> Wallet: <span id="homeRem">0</span>
                    </p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div onclick="location.href='new-order.html'" class="action-card cursor-pointer bg-slate-900 p-6 rounded-[2rem] shadow-xl flex items-center justify-between border-b-4 border-orange-500">
                <div class="flex items-center gap-4">
                    <div class="bg-orange-500 w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-orange-500/30">
                        <i class="fas fa-plus text-xl"></i>
                    </div>
                    <span class="font-black text-white uppercase tracking-wider">Start New Order</span>
                </div>
                <i class="fas fa-arrow-right text-slate-600"></i>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="location.href='active-orders.html'" class="action-card cursor-pointer bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col gap-4">
                    <div class="bg-blue-50 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-inner">
                        <span>⏱️</span>
                    </div>
                    <span class="font-black text-gray-700 text-xs uppercase tracking-tight">Active Orders</span>
                </div>

                <div onclick="location.href='completed.html'" class="action-card cursor-pointer bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col gap-4">
                    <div class="bg-green-50 w-10 h-10 rounded-xl flex items-center justify-center text-green-500 shadow-inner">
                        <i class="fas fa-check-double"></i>
                    </div>
                    <span class="font-black text-gray-700 text-xs uppercase tracking-tight">Completed</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Supabase Configuration
        const SB_URL = "https://hfaghazbwdbjurachzzq.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmYWdoYXpid2RianVyYWNoenpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4ODQ1ODAsImV4cCI6MjA4NjQ2MDU4MH0.ojmtP9i_wO74CuvDUgI--lhocsfqcB_Lql_hC2w8UMI";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        // Security Check: Redirect if not logged in
        const userPhone = (localStorage.getItem('faster_phone') || "").trim();
        if (!userPhone) {
            window.location.replace('index.html');
        }

        const sound = document.getElementById('notifSound');

        // Initialize App
        async function initializeApp() {
            if (!navigator.onLine) return; // Skip fetch if offline

            document.getElementById('userName').innerText = localStorage.getItem('faster_name') || 'Customer';

            try {
                // Fetch Logo
                const { data: settings } = await _supabase.from('app_settings').select('logo_url').eq('id', 1).single();
                if (settings && settings.logo_url) {
                    const imgH = document.getElementById('appLogo');
                    const imgS = document.getElementById('sideLogo');
                    imgH.src = imgS.src = settings.logo_url;
                    imgH.classList.remove('hidden');
                    imgS.classList.remove('hidden');
                    document.getElementById('logoFallback').classList.add('hidden');
                }
            } catch (err) {
                console.error("Logo fetch failed:", err);
            }

            if(userPhone) {
                checkNotifications();
                fetchWalletBalance();
                setupRealtime();
            }
        }

        // Fetch Wallet Data securely
        async function fetchWalletBalance() {
            if (!navigator.onLine) return;

            document.getElementById('walletLoading').classList.remove('hidden');
            
            try {
                const { data: orders, error } = await _supabase
                    .from('orders')
                    .select('balance_amount')
                    .eq('customer_phone', userPhone)
                    .eq('status', 'completed')
                    .order('updated_at', { ascending: false })
                    .limit(1); // Performance optimization: Only fetch the latest

                if (error) throw error;

                const hPend = document.getElementById('homePend');
                const hRem = document.getElementById('homeRem');
                const pBox = document.getElementById('homePendBox');
                const rBox = document.getElementById('homeRemBox');

                if (orders && orders.length > 0) {
                    const currentBal = parseFloat(orders[0].balance_amount || 0);

                    if (currentBal > 0) { 
                        hPend.innerText = `Rs. ${currentBal}`; 
                        pBox.classList.remove('hidden'); 
                        rBox.classList.add('hidden'); 
                    }
                    else if (currentBal < 0) { 
                        hRem.innerText = `Rs. ${Math.abs(currentBal)}`; 
                        rBox.classList.remove('hidden'); 
                        pBox.classList.add('hidden'); 
                    }
                    else { 
                        pBox.classList.add('hidden'); 
                        rBox.classList.add('hidden'); 
                    }
                } else {
                    pBox.classList.add('hidden'); 
                    rBox.classList.add('hidden'); 
                }
            } catch (e) { 
                console.log("Wallet fetch error", e); 
            } finally {
                document.getElementById('walletLoading').classList.add('hidden');
            }
        }

        // Check Notifications
        async function checkNotifications() {
            if (!navigator.onLine) return;

            try {
                const lastRead = localStorage.getItem('last_notif_read') || new Date().toISOString();
                
                const [chatRes, orderRes] = await Promise.all([
                    _supabase.from('chats').select('*', { count: 'exact', head: true }).eq('receiver_id', userPhone).gt('created_at', lastRead),
                    _supabase.from('orders').select('*', { count: 'exact', head: true }).eq('customer_phone', userPhone).gt('updated_at', lastRead)
                ]);

                const bell = document.getElementById('notifBell');
                const badge = document.getElementById('notifBadge');
                
                if ((chatRes.count || 0) > 0 || (orderRes.count || 0) > 0) { 
                    badge.style.display = 'block'; 
                    bell.classList.add('text-red-500'); 
                } else { 
                    badge.style.display = 'none'; 
                    bell.classList.remove('text-red-500'); 
                }
            } catch (e) {
                console.error("Notification check failed:", e);
            }
        }

        // Ringtone Logic with WebView Safety
        function ring() { 
            sound.currentTime = 0; 
            // Try-catch logic prevents crashing if browser blocks autoplay
            let playPromise = sound.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Audio play prevented by browser/webview:", error);
                });
            }
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]); 
        }

        // Realtime Subscriptions
        function setupRealtime() {
            // Remove existing channels if reconnecting to prevent duplicate firing
            _supabase.removeAllChannels();

            _supabase.channel('customer-live')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'order_chats' }, (payload) => { 
                    if(payload.new.sender_phone !== userPhone) {
                        checkNotifications(); 
                        ring(); 
                    }
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders', filter: `customer_phone=eq.${userPhone}` }, () => { 
                    checkNotifications(); 
                    ring(); 
                    fetchWalletBalance(); 
                })
                .subscribe();
        }

        // UI Interactions
        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('active'); 
        }
        
        function logout() { 
            if(confirm("Are you sure you want to logout?")) { 
                localStorage.clear(); 
                window.location.replace("index.html"); 
            } 
        }

        // Network State Listeners (Online/Offline)
        window.addEventListener('offline', () => {
            document.getElementById('offlineBanner').style.top = '0';
        });

        window.addEventListener('online', () => {
            document.getElementById('offlineBanner').style.top = '-50px';
            initializeApp(); // Refresh data when back online
        });

        // Set Dynamic Greeting
        function setGreeting() {
            const hour = new Date().getHours();
            document.getElementById('greeting').innerText = hour < 12 ? "Good Morning," : (hour < 17 ? "Good Afternoon," : "Good Evening,");
        }

        // Boot
        setGreeting();
        initializeApp();
    </script>
</body>
</html>
