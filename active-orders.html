<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faster - Active Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <style>
        /* WebView specific fixes (Pull to refresh & Text selection disabled) */
        html, body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overscroll-behavior-y: none; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        
        .animate-pulse-fast { animation: pulse 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .thumb-box { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #fullMediaView { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; }
        
        .order-card { transition: all 0.3s ease; }

        /* Offline Banner Animation */
        #offlineBanner { transition: top 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">

    <div id="offlineBanner" class="fixed top-[-50px] left-0 w-full bg-red-500 text-white text-center text-[10px] uppercase tracking-widest py-2 z-[60] font-black shadow-md">
        <i class="fas fa-wifi-slash mr-2"></i> No Internet Connection
    </div>

    <header class="sticky top-0 bg-white/80 backdrop-blur-md z-40 p-4 flex items-center border-b">
        <i class="fas fa-chevron-left text-xl mr-4 p-2 cursor-pointer active:scale-90 transition-transform text-gray-700" onclick="window.location.href='home.html'"></i>
        <h1 class="text-xl font-black text-gray-800 tracking-tight">Active Orders</h1>
    </header>

    <main class="p-4">
        <div id="activeList" class="space-y-4">
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-gray-200 rounded-[2.5rem]"></div>
                <div class="h-32 bg-gray-200 rounded-[2.5rem]"></div>
            </div>
        </div>
    </main>

    <div id="previewModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-end justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh] transform transition-transform translate-y-0">
            <div class="sticky top-0 bg-white p-4 flex justify-center border-b z-10 cursor-pointer" onclick="closePreview()">
                <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
            </div>
            <div id="modalContent" class="p-6 space-y-6 pb-24"></div>
            <div class="p-4 sticky bottom-0 bg-white/90 backdrop-blur-md border-t">
                <button onclick="closePreview()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black shadow-lg active:scale-[0.98] transition-transform">Close Details</button>
            </div>
        </div>
    </div>

    <div id="fullMediaView" onclick="this.style.display='none'">
        <div id="fullMediaContainer" class="w-full h-full flex items-center justify-center p-4"></div>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = "https://hfaghazbwdbjurachzzq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmYWdoYXpid2RianVyYWNoenpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4ODQ1ODAsImV4cCI6MjA4NjQ2MDU4MH0.ojmtP9i_wO74CuvDUgI--lhocsfqcB_Lql_hC2w8UMI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const userPhone = (localStorage.getItem('faster_phone') || "").trim();
        
        // --- 100% WEBVIEW AUDIO FIX: Direct JavaScript Audio Object ---
        const sound = new Audio("https://hfaghazbwdbjurachzzq.supabase.co/storage/v1/object/public/order-files/rigtone.mp3");
        sound.preload = "auto";
        let isAudioUnlocked = false;
        
        let currentOrders = [];
        let activeTimers = {};
        let globalDeliveryTime = 30;
        let unreadCounts = {}; 

        // Audio Force Unlocker (Muted Autoplay Hack)
        function forceUnlockAudio() {
            if (isAudioUnlocked) return;
            
            sound.muted = true; 
            let promise = sound.play();
            
            if (promise !== undefined) {
                promise.then(() => {
                    sound.pause();
                    sound.currentTime = 0;
                    sound.muted = false; 
                    isAudioUnlocked = true;
                    console.log("Audio Unlocked for WebView!");
                }).catch(error => {
                    console.log("Audio still blocked:", error);
                });
            }
            
            document.removeEventListener('click', forceUnlockAudio);
            document.removeEventListener('touchstart', forceUnlockAudio);
            document.removeEventListener('scroll', forceUnlockAudio);
        }

        document.addEventListener('click', forceUnlockAudio);
        document.addEventListener('touchstart', forceUnlockAudio);
        document.addEventListener('scroll', forceUnlockAudio);

        // Ringtone & Vibrate Logic
        function ring() { 
            if(!sound) return;
            sound.volume = 1.0; 
            sound.currentTime = 0; 
            
            let playPromise = sound.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Audio blocked by Android policy:", error);
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]); 
                });
            } else {
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]); 
            }
        }

        async function init() {
            if(!userPhone) {
                alert("Session expired. Please login again.");
                window.location.replace('index.html');
                return;
            }

            if(navigator.onLine) {
                try {
                    const { data: settings } = await _supabase.from('app_settings').select('delivery_timer').single();
                    if (settings) globalDeliveryTime = settings.delivery_timer;
                } catch (e) { console.warn("Settings error"); }
            }

            await fetchOrders();
            setupRealtime();

            // Offline-safe Polling 
            setInterval(() => {
                if(navigator.onLine) { fetchOrders(); }
            }, 3000);
        }

        function setupRealtime() {
            _supabase.removeAllChannels();

            // Order Updates
            _supabase.channel('order-updates').on('postgres_changes', { 
                event: 'UPDATE', schema: 'public', table: 'orders', filter: `customer_phone=eq.${userPhone}` 
            }, (payload) => {
                ring(); 
                fetchOrders();
            }).subscribe();

            // New Chat Message
            _supabase.channel('message-notifs').on('postgres_changes', { 
                event: 'INSERT', schema: 'public', table: 'order_chats' 
            }, (payload) => {
                if(payload.new.sender_phone !== userPhone) {
                    ring(); 
                    fetchUnreadCounts(); 
                }
            }).subscribe();

            // Message Seen (Clear Badge)
            _supabase.channel('message-seen').on('postgres_changes', { 
                event: 'UPDATE', schema: 'public', table: 'order_chats' 
            }, (payload) => {
                fetchUnreadCounts(); 
            }).subscribe();
        }

        async function fetchUnreadCounts() {
            if (!currentOrders || currentOrders.length === 0) {
                renderOrders(currentOrders);
                return;
            }
            const orderIds = currentOrders.map(o => o.id);
            
            const { data, error } = await _supabase
                .from('order_chats')
                .select('order_id')
                .in('order_id', orderIds)
                .neq('sender_phone', userPhone)
                .neq('status', 'seen'); 
                
            let newCounts = {};
            if (!error && data) {
                data.forEach(msg => {
                    newCounts[msg.order_id] = (newCounts[msg.order_id] || 0) + 1;
                });
            }
            unreadCounts = newCounts;
            renderOrders(currentOrders);
        }

        async function fetchOrders() {
            if(!navigator.onLine) return; 

            const { data, error } = await _supabase.from('orders')
                .select('*')
                .eq('customer_phone', userPhone)
                .not('status', 'in', '("completed","canceled","CANCELLED","cancelled")')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error("Fetch Error:", error.message);
                return;
            }

            currentOrders = data || [];
            fetchUnreadCounts(); 
        }

        function renderOrders(orders) {
            const list = document.getElementById('activeList');
            
            if (orders.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 opacity-40">
                        <i class="fas fa-box-open text-5xl mb-4 text-gray-300"></i>
                        <p class="font-black text-xs uppercase tracking-widest text-center text-gray-400">No Active Orders<br><span class="text-[10px]">Orders will appear here once placed</span></p>
                    </div>`;
                return;
            }

            Object.values(activeTimers).forEach(clearInterval);
            activeTimers = {};

            list.innerHTML = orders.map(order => {
                const status = (order.status || 'pending').toLowerCase();
                const riderStatus = (order.rider_status || '').toLowerCase();
                const isArrived = (status === 'arrived' || riderStatus === 'arrived');
                
                let displayStatus = "SEARCHING";
                let statusColor = "bg-amber-500 text-white animate-pulse";
                let statusMsg = "Looking for a Rider...";
                let showTimer = false;

                if (isArrived) {
                    displayStatus = "ARRIVED";
                    statusColor = "bg-red-600 text-white animate-pulse-fast shadow-md shadow-red-500/30";
                    statusMsg = "Rider has arrived! Collect your order.";
                } else if (status === 'assigned') {
                    showTimer = true;
                    if (parseFloat(order.bill_amount) > 0) {
                        displayStatus = "ON THE WAY";
                        statusColor = "bg-emerald-500 text-white shadow-md shadow-emerald-500/30";
                        statusMsg = "Rider is heading to your location.";
                    } else {
                        displayStatus = "PURCHASING";
                        statusColor = "bg-blue-600 text-white shadow-md shadow-blue-500/30";
                        statusMsg = "Rider is purchasing your items...";
                    }
                }

                return `
                <div class="order-card bg-white rounded-[2.5rem] p-5 shadow-sm border border-gray-100 active:scale-[0.98] cursor-pointer" onclick="openPreview('${order.id}')">
                    <div class="flex justify-between items-center mb-4">
                        <span class="px-4 py-1.5 rounded-full text-[9px] font-black tracking-widest ${statusColor}">${displayStatus}</span>
                        <p class="text-[10px] font-mono text-gray-300 italic">#${order.id.slice(-8)}</p>
                    </div>
                    
                    <h3 class="text-base font-black text-gray-800 mb-1 leading-tight">${statusMsg}</h3>
                    <p class="text-[11px] text-gray-400 font-medium mb-4">${dayjs(order.created_at).format('DD MMM, hh:mm A')}</p>

                    ${showTimer ? `
                        <div class="p-4 bg-red-50 rounded-3xl border border-red-100 flex flex-col items-center justify-center mb-4">
                            <span class="text-[9px] font-black text-red-400 uppercase tracking-tighter mb-1">Estimated Arrival</span>
                            <div id="timer-${order.id}" class="text-3xl font-black text-red-600 tracking-tighter">--:--</div>
                        </div>
                    ` : ''}

                    <div class="pt-4 border-t border-dashed flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center border-2 border-white">
                                <i class="fas fa-shopping-bag text-gray-400 text-xs"></i>
                            </div>
                            <span class="text-[10px] font-black text-gray-400 uppercase">Tracked</span>
                        </div>
                        ${(status === 'assigned' || isArrived) ? 
                            `<button onclick="event.stopPropagation(); window.location.href='chat.html?orderId=${order.id}'" class="relative bg-blue-600 text-white px-6 py-2.5 rounded-2xl text-[11px] font-black shadow-lg active:scale-95 transition-transform flex items-center gap-2">
                                <i class="fas fa-comment-dots"></i> CHAT
                                ${unreadCounts[order.id] ? `<span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white animate-bounce">${unreadCounts[order.id]}</span>` : ''}
                            </button>` : ''}
                    </div>
                </div>`;
            }).join('');

            orders.forEach(o => {
                const status = (o.status || 'pending').toLowerCase();
                const riderStatus = (o.rider_status || '').toLowerCase();
                if (status === 'assigned' && riderStatus !== 'arrived' && status !== 'arrived') {
                    runTimer(o.id, o.assigned_at);
                }
            });
        }

        function runTimer(id, assignedAt) {
            const start = assignedAt ? dayjs(assignedAt) : dayjs();
            const end = start.add(globalDeliveryTime, 'minute');
            
            const update = () => {
                const el = document.getElementById(`timer-${id}`);
                if (!el) return;
                const diff = end.diff(dayjs());
                const abs = Math.abs(diff);
                const m = Math.floor(abs / 60000);
                const s = Math.floor((abs % 60000) / 1000);
                el.innerText = (diff < 0 ? '-' : '') + `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (diff < 0) el.className = "text-3xl font-black text-gray-400 tracking-tighter";
            };
            update();
            activeTimers[id] = setInterval(update, 1000);
        }

        function openPreview(orderId) {
            const order = currentOrders.find(o => o.id === orderId);
            if (!order) return;

            const content = document.getElementById('modalContent');
            const modal = document.getElementById('previewModal');
            modal.classList.remove('hidden');

            const mediaHelper = (str, type) => {
                if(!str) return '';
                return str.split(',').map(url => {
                    const u = url.trim();
                    if(type === 'img') return `<img src="${u}" class="thumb-box shadow-sm" onclick="showFull('${u}', 'img')">`;
                    if(type === 'vid') return `<div class="relative"><video src="${u}" class="thumb-box shadow-sm"></video><div class="absolute inset-0 flex items-center justify-center bg-black/30 rounded-[15px]" onclick="showFull('${u}', 'vid')"><i class="fas fa-play text-white text-xl drop-shadow-md"></i></div></div>`;
                }).join('');
            };

            content.innerHTML = `
                <div class="text-center">
                    <h2 class="text-2xl font-black text-gray-900">Order Details</h2>
                    <p class="text-[9px] text-gray-400 font-mono font-bold uppercase mt-1">ID: ${order.id}</p>
                </div>

                <div class="bg-gray-50 p-5 rounded-[2rem] border border-gray-100">
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Items</h4>
                    <p class="text-sm font-bold text-gray-700 leading-relaxed whitespace-pre-wrap">${order.order_details || 'No description'}</p>
                    <div class="media-grid mt-4">${mediaHelper(order.image_url, 'img')}${mediaHelper(order.video_url, 'vid')}</div>
                </div>

                ${order.bill_image ? `
                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Receipt from Rider</h4>
                    <img src="${order.bill_image}" class="rounded-3xl w-full border-4 border-white shadow-xl" onclick="showFull(this.src, 'img')">
                </div>` : ''}

                <div class="bg-gray-900 p-6 rounded-[2.5rem] text-white shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-gray-400">Total Payable</span>
                        <span class="text-2xl font-black text-emerald-400">Rs. ${order.bill_amount || 0}</span>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-white/50 border-t border-white/10 pt-4">
                        <span>Items + Delivery</span>
                        <span>Rs. ${(parseFloat(order.item_price)||0) + (parseFloat(order.dc_amount)||0)}</span>
                    </div>
                </div>

                <div class="p-5 bg-blue-50 rounded-3xl border border-blue-100 flex items-start gap-4">
                    <i class="fas fa-map-marker-alt text-blue-600 mt-1"></i>
                    <div>
                        <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Delivery Address</h4>
                        <p class="text-xs font-bold text-blue-900 leading-snug">${order.delivery_address || 'N/A'}</p>
                    </div>
                </div>
            `;
        }

        function showFull(url, type) {
            const container = document.getElementById('fullMediaContainer');
            document.getElementById('fullMediaView').style.display = 'flex';
            container.innerHTML = type === 'img' ? 
                `<img src="${url}" class="max-w-[95%] max-h-[80vh] object-contain rounded-2xl border-2 border-white">` : 
                `<video src="${url}" controls autoplay class="max-w-[95%] max-h-[80vh] rounded-2xl"></video>`;
        }

        function closePreview() { 
            document.getElementById('previewModal').classList.add('hidden'); 
        }
        
        // Network State Tracking
        window.addEventListener('offline', () => document.getElementById('offlineBanner').style.top = '0');
        window.addEventListener('online', () => {
            document.getElementById('offlineBanner').style.top = '-50px';
            fetchOrders();
        });

        // Cache busting for iOS/Android Back button 
        window.addEventListener('pageshow', function (event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                fetchOrders();
            }
        });

        window.onload = init;
    </script>
</body>
</html>
